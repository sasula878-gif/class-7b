<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>7Б — Добавить ученика</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>:root{--y:#FFD93D;--o:#FF6B35;--dark:#1a1a2e;--card:rgba(255,255,255,.06);--brd:rgba(255,255,255,.1);--txt:rgba(255,255,255,.9);--mut:rgba(255,255,255,.45)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{background:rgba(255,255,255,.05);border:2px solid var(--brd);border-radius:22px;padding:38px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.4)}.t{font-size:24px;font-weight:900;margin-bottom:6px}.s{color:var(--mut);font-size:14px;margin-bottom:26px}.lb{display:block;font-size:12px;font-weight:900;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}.inp{width:100%;background:rgba(255,255,255,.07);border:2px solid var(--brd);border-radius:12px;padding:12px 15px;color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:.2s}.inp::placeholder{color:var(--mut)}.inp:focus{border-color:var(--y)}.fg{margin-bottom:16px}.ep{display:flex;flex-wrap:wrap;gap:7px;margin-top:7px}.eb{width:38px;height:38px;border-radius:9px;border:2px solid var(--brd);background:var(--card);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}.eb:hover,.eb.on{border-color:var(--y);background:rgba(255,217,61,.12);transform:scale(1.1)}.row{display:flex;gap:10px;margin-top:24px}.sub{flex:1;background:linear-gradient(135deg,var(--y),var(--o));color:var(--dark);border:none;border-radius:13px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:.2s}.sub:hover{transform:translateY(-2px)}.can{display:flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:13px;background:var(--card);border:1px solid var(--brd);color:var(--txt);text-decoration:none;font-weight:700}</style></head>
<body><div class="card"><div class="t">👤 Новый ученик</div><div class="s">Добавить в список класса 7Б</div>
<form method="POST">
<div class="fg"><label class="lb">Полное имя</label><input class="inp" type="text" name="name" placeholder="Иванов Иван" required></div>
<div class="fg"><label class="lb">Роль (необязательно)</label><input class="inp" type="text" name="role" placeholder="Физорг, Редактор..."></div>
<div class="fg"><label class="lb">Аватар</label><input type="hidden" name="emoji" id="ei" value="🧑">
<div class="ep">{% for e in ['🧑','👦','👧','🧒','⭐','🦊','🐱','🐶','🦁','🐼','🎓','🌟','💫','🎯','🏆','😎'] %}<button type="button" class="eb {% if e=='🧑' %}on{% endif %}" onclick="se(this,'{{ e }}')">{{ e }}</button>{% endfor %}</div></div>
<div class="row"><button class="sub" type="submit">Добавить ✅</button><a href="/students" class="can">Отмена</a></div>
</form></div>
<script>function se(b,e){document.querySelectorAll('.eb').forEach(x=>x.classList.remove('on'));b.classList.add('on');document.getElementById('ei').value=e;}</script>
</body></html>
