<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7Б — Войти</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFD93D;
            --orange: #FF6B35;
            --pink: #FF4D6D;
            --purple: #7B2FBE;
            --blue: #4CC9F0;
            --green: #06D6A0;
            --dark: #1a1a2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg-shapes {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }
        .shape:nth-child(1) { width: 300px; height: 300px; background: var(--pink); top: -100px; left: -80px; animation-delay: 0s; }
        .shape:nth-child(2) { width: 200px; height: 200px; background: var(--yellow); bottom: -60px; right: -40px; animation-delay: 1s; }
        .shape:nth-child(3) { width: 150px; height: 150px; background: var(--blue); top: 50%; right: 10%; animation-delay: 2s; }
        .shape:nth-child(4) { width: 100px; height: 100px; background: var(--green); bottom: 20%; left: 5%; animation-delay: 3s; }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        .login-card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 48px 44px;
            width: 400px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: slideUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            color: var(--dark);
            font-size: 48px;
            font-weight: 900;
            width: 90px; height: 90px;
            border-radius: 24px;
            line-height: 90px;
            margin-bottom: 16px;
            box-shadow: 0 8px 30px rgba(255,107,53,0.4);
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .logo h1 { color: white; font-size: 28px; font-weight: 900; }
        .logo p { color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        .form-group input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 14px 18px;
            color: white;
            font-family: 'Nunito', sans-serif;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.35); }
        .form-group input:focus {
            border-color: var(--yellow);
            background: rgba(255,217,61,0.08);
            box-shadow: 0 0 0 4px rgba(255,217,61,0.12);
        }
        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--yellow), var(--orange));
            color: var(--dark);
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-family: 'Nunito', sans-serif;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(255,107,53,0.35);
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255,107,53,0.5);
        }
        .btn-login:active { transform: translateY(0); }
        .hint {
            margin-top: 20px;
            text-align: center;
            color: rgba(255,255,255,0.3);
            font-size: 13px;
        }
        .emojis {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            overflow: hidden;
        }
        .emoji {
            position: absolute;
            font-size: 24px;
            animation: emojiFloat linear infinite;
            opacity: 0.4;
        }
        @keyframes emojiFloat {
            from { transform: translateY(110vh) rotate(0deg); opacity: 0.4; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <div class="emojis" id="emojis"></div>

    <div class="login-card">
        <div class="logo">
            <div class="logo-badge">7Б</div>
            <h1>Наш Класс!</h1>
            <p>Добро пожаловать обратно 🎉</p>
        </div>
        <form method="POST">
            <div class="form-group">
                <input type="text" name="username" placeholder="👤 Логин" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="🔑 Пароль" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Войти 🚀</button>
        </form>
        <p class="hint">Забыл пароль? Спроси классного руководителя 😄</p>
    </div>

    <script>
        const emojis = ['📚','✏️','🎒','🏆','⭐','🎯','📝','🔬','🎨','📐','🧮','🎵'];
        const container = document.getElementById('emojis');
        function spawnEmoji() {
            const el = document.createElement('div');
            el.className = 'emoji';
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (8 + Math.random() * 8) + 's';
            el.style.animationDelay = Math.random() * 2 + 's';
            el.style.fontSize = (16 + Math.random() * 20) + 'px';
            container.appendChild(el);
            setTimeout(() => el.remove(), 18000);
        }
        for (let i = 0; i < 12; i++) spawnEmoji();
        setInterval(spawnEmoji, 1500);
    </script>
</body>
</html>
