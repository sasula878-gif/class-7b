<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7Б — Новый пользователь</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFD93D; --orange: #FF6B35; --pink: #FF4D6D;
            --green: #06D6A0; --blue: #4CC9F0;
            --dark: #1a1a2e; --card: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.1);
            --text: rgba(255,255,255,0.9); --muted: rgba(255,255,255,0.45);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .form-card { background: rgba(255,255,255,0.05); border: 2px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 500px; backdrop-filter: blur(16px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .form-title { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
        .form-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .form-input, .form-select {
            width: 100%; background: rgba(255,255,255,0.07); border: 2px solid var(--border);
            border-radius: 12px; padding: 12px 16px; color: var(--text);
            font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600;
            transition: all 0.2s; outline: none;
        }
        .form-input::placeholder { color: var(--muted); }
        .form-input:focus, .form-select:focus { border-color: var(--yellow); background: rgba(255,217,61,0.06); }
        .form-select option { background: #1a1a2e; }

        /* ROLE PICKER */
        .role-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px; }
        .role-option { display: none; }
        .role-option + label {
            display: flex; align-items: center; gap: 10px;
            padding: 14px 16px; border-radius: 14px; border: 2px solid var(--border);
            background: var(--card); cursor: pointer; transition: all 0.2s;
            font-weight: 700; font-size: 15px;
        }
        .role-option:checked + label { border-color: var(--yellow); background: rgba(255,217,61,0.1); }
        .role-option + label:hover { border-color: rgba(255,255,255,0.25); }
        .role-icon { font-size: 22px; }

        .error-box { background: rgba(255,77,109,0.12); border: 1px solid rgba(255,77,109,0.35); border-radius: 12px; padding: 12px 16px; color: var(--pink); font-weight: 700; font-size: 14px; margin-bottom: 20px; }
        .form-actions { display: flex; gap: 12px; margin-top: 28px; }
        .btn-submit { flex: 1; background: linear-gradient(135deg, var(--yellow), var(--orange)); color: var(--dark); border: none; border-radius: 14px; padding: 14px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 900; cursor: pointer; transition: all 0.2s; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.4); }
        .btn-cancel { display: flex; align-items: center; justify-content: center; padding: 14px 20px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); color: var(--text); text-decoration: none; font-weight: 700; font-size: 15px; }
        .btn-cancel:hover { background: rgba(255,255,255,0.1); }

        .hint { font-size: 12px; color: var(--muted); margin-top: 6px; }
    </style>
</head>
<body>
    <div class="form-card">
        <div class="form-title">🔑 Новый пользователь</div>
        <div class="form-sub">Создай аккаунт для ученика, родителя или учителя</div>

        {% if error %}
        <div class="error-box">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label class="form-label">Имя / Отображаемое имя</label>
                <input class="form-input" type="text" name="display_name" placeholder="Например: Иванов Иван" required>
            </div>
            <div class="form-group">
                <label class="form-label">Логин (для входа)</label>
                <input class="form-input" type="text" name="username" placeholder="Например: ivanov_ivan" required pattern="[a-zA-Z0-9_]+" title="Только буквы, цифры и _">
                <div class="hint">Только латинские буквы, цифры и _</div>
            </div>
            <div class="form-group">
                <label class="form-label">Пароль</label>
                <input class="form-input" type="text" name="password" placeholder="Придумай пароль" required>
                <div class="hint">Запиши и отдай пользователю</div>
            </div>
            <div class="form-group">
                <label class="form-label">Роль</label>
                <div class="role-picker">
                    <input class="role-option" type="radio" name="role" id="r_student" value="student" checked>
                    <label for="r_student"><span class="role-icon">🎒</span> Ученик</label>

                    <input class="role-option" type="radio" name="role" id="r_parent" value="parent">
                    <label for="r_parent"><span class="role-icon">👨‍👩‍👦</span> Родитель</label>

                    <input class="role-option" type="radio" name="role" id="r_teacher" value="teacher">
                    <label for="r_teacher"><span class="role-icon">👩‍🏫</span> Кл. рук.</label>

                    <input class="role-option" type="radio" name="role" id="r_admin" value="admin">
                    <label for="r_admin"><span class="role-icon">👑</span> Админ</label>
                </div>
            </div>
            <div class="form-actions">
                <button class="btn-submit" type="submit">Создать ✅</button>
                <a href="/users" class="btn-cancel">Отмена</a>
            </div>
        </form>
    </div>
</body>
</html>
