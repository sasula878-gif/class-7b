<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>7Б — Новый пользователь</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>:root{--y:#FFD93D;--o:#FF6B35;--p:#FF4D6D;--g:#06D6A0;--b:#4CC9F0;--dark:#1a1a2e;--card:rgba(255,255,255,.06);--brd:rgba(255,255,255,.1);--txt:rgba(255,255,255,.9);--mut:rgba(255,255,255,.45)}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--txt);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}.card{background:rgba(255,255,255,.05);border:2px solid var(--brd);border-radius:22px;padding:38px;width:100%;max-width:500px;box-shadow:0 20px 60px rgba(0,0,0,.4)}.t{font-size:24px;font-weight:900;margin-bottom:6px}.s{color:var(--mut);font-size:14px;margin-bottom:26px}.err{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.35);border-radius:11px;padding:10px 14px;color:var(--p);font-weight:700;font-size:14px;margin-bottom:18px}.lb{display:block;font-size:12px;font-weight:900;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}.inp{width:100%;background:rgba(255,255,255,.07);border:2px solid var(--brd);border-radius:12px;padding:12px 15px;color:var(--txt);font-family:'Nunito',sans-serif;font-size:15px;font-weight:600;outline:none;transition:.2s}.inp::placeholder{color:var(--mut)}.inp:focus{border-color:var(--y)}.fg{margin-bottom:16px}.hint{font-size:12px;color:var(--mut);margin-top:5px}.rp{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:7px}.ro{display:none}.ro+label{display:flex;align-items:center;gap:9px;padding:13px 15px;border-radius:13px;border:2px solid var(--brd);background:var(--card);cursor:pointer;transition:.2s;font-weight:700;font-size:14px}.ro:checked+label{border-color:var(--y);background:rgba(255,217,61,.1)}.ro+label:hover{border-color:rgba(255,255,255,.25)}.ri{font-size:20px}.row{display:flex;gap:10px;margin-top:24px}.sub{flex:1;background:linear-gradient(135deg,var(--y),var(--o));color:var(--dark);border:none;border-radius:13px;padding:14px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:.2s}.sub:hover{transform:translateY(-2px)}.can{display:flex;align-items:center;justify-content:center;padding:14px 18px;border-radius:13px;background:var(--card);border:1px solid var(--brd);color:var(--txt);text-decoration:none;font-weight:700}</style></head>
<body><div class="card"><div class="t">🔑 Новый пользователь</div><div class="s">Создай аккаунт для входа на сайт</div>
{% if error %}<div class="err">⚠️ {{ error }}</div>{% endif %}
<form method="POST">
<div class="fg"><label class="lb">Имя (отображается на сайте)</label><input class="inp" type="text" name="display_name" placeholder="Иванов Иван" required></div>
<div class="fg"><label class="lb">Логин (для входа)</label><input class="inp" type="text" name="username" placeholder="ivanov_ivan" required pattern="[a-zA-Z0-9_]+" title="Только буквы, цифры и _"><div class="hint">Только латинские буквы, цифры и знак _</div></div>
<div class="fg"><label class="lb">Пароль</label><input class="inp" type="text" name="password" placeholder="Придумай пароль" required><div class="hint">Запиши и передай пользователю</div></div>
<div class="fg"><label class="lb">Роль</label>
<div class="rp">
<input class="ro" type="radio" name="role" id="rs" value="student" checked><label for="rs"><span class="ri">🎒</span> Ученик</label>
<input class="ro" type="radio" name="role" id="rp" value="parent"><label for="rp"><span class="ri">👨‍👩‍👦</span> Родитель</label>
<input class="ro" type="radio" name="role" id="rt" value="teacher"><label for="rt"><span class="ri">👩‍🏫</span> Кл. рук.</label>
<input class="ro" type="radio" name="role" id="ra" value="admin"><label for="ra"><span class="ri">👑</span> Админ</label>
</div></div>
<div class="row"><button class="sub" type="submit">Создать ✅</button><a href="/users" class="can">Отмена</a></div>
</form></div></body></html>
